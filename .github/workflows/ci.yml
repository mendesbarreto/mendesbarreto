name: Generate CV in PDF
on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - "!*"
      - "master"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GH_PAT: ${{ secrets.GH_PAT }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CI: true

jobs:
  md_to_pdf:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 10
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2
      - run: chrome --version

      - name: Install dependencies
        run: npm i -g md-to-pdf

      - name: Convert
        run: |
          shopt -s nullglob
          cv_files=(CV*.md)

          if [ ${#cv_files[@]} -eq 0 ]; then
            echo "No CV markdown files found."
            exit 0
          fi

          for cv_file in "${cv_files[@]}"; do
            echo "Generating PDF for ${cv_file}"
            md-to-pdf "${cv_file}" --config-file md-to-pdf.json --launch-options='{ "args": ["--no-sandbox"] }'
          done

      - name: Commit & Push changes
        uses: actions-js/push@master
        with:
          branch: ${{ github.ref }}
          message: "chore: Update CV pdfs [skip ci]"
          github_token: ${{ secrets.GITHUB_TOKEN }}
